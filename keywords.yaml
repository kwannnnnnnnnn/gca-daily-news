# 경기콘텐츠진흥원(GCA) 일일 언론 모니터링 — 키워드/필터 설정
# 이 파일만 고치면 수집 대상·노이즈 규칙·노출 순서를 바꿀 수 있습니다.

settings:
  hours_window: 30          # 최근 N시간 안에 나온 기사만 유지
  naver_display: 100        # 네이버 API 키워드당 최대 수집 건수(최대 100)
  min_title_similarity: 0.60  # 제목 유사도 이 값 이상이면 같은 사건으로 통합
  max_items_per_group: 40   # 그룹별 최대 보관 건수
  preview_items: 5          # 그룹별 기본 노출 개수(나머지는 '더보기'로 접힘)

# 모든 그룹 공통 제외어(제목/요약에 있으면 버림) — 증권·광고성 노이즈 차단
global_exclude:
  - 코스피
  - 코스닥
  - 상한가
  - 하한가
  - 급등주
  - 부고
  - 운세
  - 로또
  - 분양가
  - 오늘의 날씨

# 노출 순서 = priority 오름차순(우리 기관 관계·콘텐츠 관련을 앞쪽에)
#   queries      : 실제 검색어(네이버+구글 공통)
#   require_any  : 제목/요약 아무 데나 이 중 하나라도 있어야 인정(동시출현 게이트)
#   title_any    : 제목(헤드라인)에 이 중 하나라도 있어야 인정(스쳐 언급 배제·정밀도↑)
#   exclude      : 이 단어가 있으면 그 그룹에선 제외
groups:
  - id: gca
    label: 경기콘텐츠진흥원
    queries: [경기콘텐츠진흥원, 경콘진]
    # 헤드라인에 기관/사업 브랜드가 있어야만 인정(co-주최·본문 스쳐 언급 배제)
    title_any: [경기콘텐츠진흥원, 경콘진, 경기문화창조허브, 문화창조허브, 경기게임아카데미, 경기콘텐츠코리아랩, 경기영상위원회, GCON]
    priority: 1

  - id: province
    label: 경기도(콘텐츠 관련)
    queries: [경기도 콘텐츠, 경기 콘텐츠산업, 경기 게임산업, 판교 게임, 경기 웹툰, 경기도 웹툰, 경기도 메타버스, 경기 영상산업]
    require_any: [콘텐츠, 게임, 웹툰, 웹소설, 만화, 애니, 문화산업, 콘텐츠진흥원, 메타버스, 실감콘텐츠, OTT, e스포츠, 영상산업]
    title_any: [경기, 판교, 콘텐츠, 게임, 웹툰, 웹소설, 만화, 애니, 메타버스, 실감, OTT, e스포츠, 영상]
    priority: 2

  - id: governor
    label: 경기도지사
    queries: [추미애]
    # 전국구 정치 노이즈 차단: 경기 도정 맥락 단어가 있어야 인정(바닥 '경기' 제거)
    require_any: [경기도, 도지사, 도정, 경기도청, 경기지사, 민선, 경기도의회, 경기도민]
    priority: 3

  - id: gg_council
    label: 경기도의회
    queries: [경기도의회]
    title_any: [경기도의회, 경기도의원, 경기의회, 도의회, 도의원]
    priority: 4

  - id: bucheon
    label: 부천시(콘텐츠 관련)
    queries: [부천시, 조용익, 부천 웹툰, 부천 만화, 부천국제판타스틱영화제, 부천 문화도시]
    # 헤드라인에 부천/시장/부천 콘텐츠기관이 있어야(정밀)
    title_any: [부천, 조용익, BIFAN, 부천국제, 부천판타스틱, 한국만화영상진흥원, 만화영상진흥원]
    require_any: [콘텐츠, 문화, 웹툰, 만화, 애니, 게임, 영화, 축제, 부천국제, BIFAN, 진흥원, 문화도시, 관광, 부천시장]
    priority: 5

  - id: bucheon_council
    label: 부천시의회
    queries: [부천시의회]
    title_any: [부천시의회, 부천시의원, 부천 시의회]
    priority: 6

  - id: central
    label: 중앙부처(콘텐츠)
    queries: [한국콘텐츠진흥원, 콘진원, 문화체육관광부 콘텐츠, 콘텐츠산업 진흥, 게임산업 진흥, 콘텐츠 정책]
    title_any: [한국콘텐츠진흥원, 콘진원, 문화체육관광부, 문체부, 콘텐츠산업, 게임산업, K-콘텐츠, 콘텐츠 진흥, 콘텐츠 정책, 웹툰산업]
    require_any: [콘텐츠, 게임, 웹툰, 문화체육관광부, 문체부, 콘진원, 한국콘텐츠진흥원, 저작권]
    priority: 7
