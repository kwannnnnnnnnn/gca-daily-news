# 경기콘텐츠진흥원(GCA) 일일 언론 모니터링 — 키워드/필터 설정
# 이 파일만 고치면 수집 대상·노이즈 규칙·노출 순서를 바꿀 수 있습니다.

settings:
  hours_window: 30          # 최근 N시간 안에 나온 기사만 유지
  naver_display: 100        # 네이버 API 키워드당 최대 수집 건수(최대 100)
  min_title_similarity: 0.60  # 제목 유사도 이 값 이상이면 같은 사건으로 통합
  max_items_per_group: 40   # 그룹별 최대 보관 건수
  preview_items: 5          # 그룹별 기본 노출 개수(나머지는 '더보기'로 접힘)

# 모든 그룹 공통 제외어(제목/요약에 있으면 버림) — 증권·광고성·공지 노이즈 차단
global_exclude:
  - 코스피
  - 코스닥
  - 상한가
  - 하한가
  - 급등주
  - 부고
  - 운세
  - 로또
  - 분양가
  - 오늘의 날씨
  - "포토]"
  - 홍보대사
  - 화보
  - "[알림]"
  - 저작권 고지
  - 집값
  - 빅테크 벨트

# priority = 화면 노출 순서(작을수록 위/왼쪽)
# spec     = 배정 정밀도 등급(작을수록 '특정 기관'). 한 기사가 여러 그룹에 걸리면
#            spec이 낮은(더 특정한) 그룹으로 배정 → 광역분류가 기관기사 흡수 방지
# 관련도(주제) 게이트 — 그룹에 정의된 것 중 하나만 충족하면 인정:
#   require_any  : 제목/요약 아무 데나 이 중 하나(내용 게이트)
#   title_any    : 제목(헤드라인)에 이 중 하나(엔티티 정밀도)
#   lead_any     : 기사 도입부(요약 앞 14자)에 이 중 하나 → 제목에 기관명 없어도 '주체'면 인정(사업명 제목 회수)
#   title_all_of : 제목에 각 하위목록에서 하나씩 '모두'(예: 경기지역 AND 콘텐츠)
#   exclude      : 이 단어가 있으면 그 그룹에선 제외
groups:
  - id: gca
    label: 경기콘텐츠진흥원
    priority: 1
    spec: 1
    queries: [경기콘텐츠진흥원, 경콘진]
    # 기사 도입부가 경콘진이면 제목에 이름 없어도 인정(레벨업 등 사업명 제목 회수),
    # 단 'A가 주최하고 …경콘진이 주관' 식 co-언급은 도입부 밖이라 배제됨
    lead_any: [경기콘텐츠진흥원, 경콘진]
    title_any: [경기콘텐츠진흥원, 경콘진, 경기문화창조허브, 문화창조허브, 경기게임아카데미, 경기콘텐츠코리아랩, 경기영상위원회, GCON]

  - id: province
    label: 경기도(콘텐츠 관련)
    priority: 2
    spec: 5                  # 광역 catch-all
    queries: [경기도 콘텐츠, 경기 콘텐츠산업, 경기 게임산업, 판교 게임, 경기 웹툰, 경기도 웹툰, 경기도 메타버스, 경기 영상산업, 경기 애니메이션]
    exclude: [경기장, KBO, 프로야구, 월드컵, 잠재성장률, 레알]   # '경기'(경기장/스포츠경기/경기(경제)) 중의성 노이즈 컷
    # 제목에 (경기 지역) AND (콘텐츠 실체) 둘 다 → 부동산·경기장·경제·창업교육 노이즈 제거
    title_all_of:
      - [경기, 판교, 성남, 수원, 파주, 고양, 용인, 화성, 안양, 남양주, 경기도]
      - [콘텐츠, 게임, 웹툰, 웹소설, 만화, 애니, 애니메이션, 영화, 영상, 미디어아트, 미디어, 음악, 공연, 방송, e스포츠, 이스포츠, 메타버스, OTT, 문화산업, 창작, 캐릭터]

  - id: governor
    label: 경기도지사
    priority: 3
    spec: 3
    queries: [추미애]
    title_any: [추미애, 경기도지사, 경기지사, 도지사]
    lead_any: [추미애, 경기도지사]   # 도입부가 추미애/도지사면 제목에 없어도 인정
    require_any: [경기도, 도지사, 도정, 경기도청, 경기지사, 민선, 경기도민]

  - id: gg_council
    label: 경기도의회
    priority: 4
    spec: 2                  # 특정 기관 — 광역/도지사보다 우선 배정
    queries: [경기도의회]
    title_any: [경기도의회, 경기도의원, 경기의회, 도의회, 도의원]
    lead_any: [경기도의회]

  - id: bucheon
    label: 부천시(콘텐츠 관련)
    priority: 5
    spec: 4
    queries: [부천시, 조용익, 부천 웹툰, 부천 만화, 부천국제판타스틱영화제, 부천 문화도시]
    title_any: [부천, 조용익, BIFAN, 부천국제, 부천판타스틱, 한국만화영상진흥원, 만화영상진흥원]
    require_any: [콘텐츠, 웹툰, 웹소설, 만화, 애니, 게임, 영화, 영화제, 축제, 부천국제, BIFAN, 만화영상진흥원, 문화도시, 문화산업, 콘텐츠기업]

  - id: bucheon_council
    label: 부천시의회
    priority: 6
    spec: 2                  # 특정 기관 — 부천시(광역)보다 우선 배정
    queries: [부천시의회]
    title_any: [부천시의회, 부천시의원, 부천 시의회]
    lead_any: [부천시의회]

  - id: central
    label: 중앙부처(콘텐츠)
    priority: 7
    spec: 5
    queries: [한국콘텐츠진흥원, 콘진원, 문화체육관광부 콘텐츠, 콘텐츠산업 진흥, 게임산업 진흥, 콘텐츠 정책, 저작권 콘텐츠]
    # 콘텐츠 전담기관은 제목에 있으면 인정 / 문체부·정부는 콘텐츠 실체 단어까지 있어야(관광-only 배제)
    title_any: [한국콘텐츠진흥원, 콘진원, 콘텐츠진흥원, 한국저작권위, 저작권위원회, 게임물관리위원회, 영상물등급위원회]
    title_all_of:
      - [문화체육관광부, 문체부, 정부, 행정안전부, 행안부]
      - [콘텐츠, 게임, 웹툰, 웹소설, 만화, 애니, 저작권, 영상, 방송, 캐릭터, OTT, 음악산업, K-콘텐츠]
