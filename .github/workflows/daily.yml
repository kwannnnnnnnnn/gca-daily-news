name: daily-news

on:
  schedule:                   # KST = UTC+9. GitHub cron은 UTC 기준·best-effort(수 분 지연 가능)
    - cron: "0 0 * * *"       # 09:00 KST (아침)
    - cron: "0 4 * * *"       # 13:00 KST
    - cron: "0 6 * * *"       # 15:00 KST
    - cron: "0 8 * * *"       # 17:00 KST
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write            # 생성물(docs) 커밋/푸시용

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect → process → render
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python main.py

      - name: Commit & push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 생략"
          else
            git commit -m "chore: 뉴스 자동 갱신 $(TZ=Asia/Seoul date +%Y-%m-%d)"
            git push
          fi
